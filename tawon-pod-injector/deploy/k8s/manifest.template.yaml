# tawon-pod-injector — mutating admission webhook that injects
# hostNetwork=true onto Tawon-managed pods at admission time so they
# can bypass the F5 XC Vega CNI block on the tawon-operator namespace.
#
# This is a TEMPLATE. Render via:
#
#   ./deploy/certs/gen.sh > /tmp/certs.env
#   . /tmp/certs.env
#   envsubst '${TLS_CRT} ${TLS_KEY} ${CA_BUNDLE}' \
#     < deploy/k8s/manifest.template.yaml \
#     > /tmp/manifest.yaml
#   kubectl apply -f /tmp/manifest.yaml
#
# After apply, kubelet will mutate any future Tawon-managed pod
# (tawon-streamstore-*, tawon-directive, tawon-dashboard) to have
# hostNetwork=true. The operator's reconciles cannot undo this
# because the mutation happens at admission, not on the resource spec.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: tawon-pod-injector
  namespace: tawon-operator
  labels:
    app.kubernetes.io/name: tawon-pod-injector
---
apiVersion: v1
kind: Secret
metadata:
  name: tawon-pod-injector-tls
  namespace: tawon-operator
  labels:
    app.kubernetes.io/name: tawon-pod-injector
type: kubernetes.io/tls
data:
  tls.crt: ${TLS_CRT}
  tls.key: ${TLS_KEY}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tawon-pod-injector
  namespace: tawon-operator
  labels:
    app.kubernetes.io/name: tawon-pod-injector
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: tawon-pod-injector
  template:
    metadata:
      labels:
        # NOTE: not "tawon-streamstore*" / "tawon-directive" / "tawon-dashboard"
        # so the webhook never tries to mutate itself.
        app.kubernetes.io/name: tawon-pod-injector
    spec:
      serviceAccountName: tawon-pod-injector
      # hostNetwork=true on the webhook itself to bypass the same Vega
      # CNI block that necessitates the webhook in the first place.
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
      containers:
        - name: injector
          image: quay.io/mantisnet/tawon-pod-injector:dev
          imagePullPolicy: Always
          args:
            - "-listen=:18444"   # hostNetwork; lower ports already taken
          ports:
            - name: webhook
              containerPort: 18444
              protocol: TCP
          volumeMounts:
            - name: tls
              mountPath: /etc/webhook/certs
              readOnly: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: webhook
              scheme: HTTPS
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: tls
          secret:
            secretName: tawon-pod-injector-tls
---
apiVersion: v1
kind: Service
metadata:
  name: tawon-pod-injector
  namespace: tawon-operator
  labels:
    app.kubernetes.io/name: tawon-pod-injector
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: tawon-pod-injector
  ports:
    - name: webhook
      port: 443                # apiserver dials https://svc:443/mutate
      targetPort: 18444
      protocol: TCP
---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: tawon-pod-injector
  labels:
    app.kubernetes.io/name: tawon-pod-injector
webhooks:
  - name: pod-injector.tawon.mantisnet.com
    clientConfig:
      service:
        name: tawon-pod-injector
        namespace: tawon-operator
        path: /mutate
      caBundle: ${CA_BUNDLE}
    rules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE"]
        resources: ["pods"]
        scope: "Namespaced"
    namespaceSelector:
      matchLabels:
        kubernetes.io/metadata.name: tawon-operator
    # Skip mutating ourselves — we already set hostNetwork=true
    # statically in the Deployment template above.
    objectSelector:
      matchExpressions:
        - key: app.kubernetes.io/name
          operator: NotIn
          values: ["tawon-pod-injector"]
    failurePolicy: Ignore       # don't block pod admission if webhook is down
    sideEffects: None
    admissionReviewVersions: ["v1"]
    timeoutSeconds: 5
    reinvocationPolicy: Never
